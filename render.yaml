# Blueprint Render — https://render.com/docs/blueprint-spec
#
# Ce fichier crée (ou met à jour) une PostgreSQL + lie DATABASE_URL au Web Service.
# Sur le dashboard : Blueprint → lier ce dépôt → Sync (ou créer depuis le Blueprint).
#
# Si ton service web sur Render a un AUTRE nom que « communication-interne », renomme-le
# dans Render pour correspondre, ou change le champ « name » ci‑dessous avant sync.
#
# Plan DB « free » : selon ton compte Render, la création peut échouer ; dans ce cas
# remplace par « plan: basic-256mb » (payant) ou crée la DB à la main.
databases:
  - name: communication-db
    databaseName: communication
    user: communication
    plan: free

services:
  - type: web
    name: communication-interne
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: communication-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "1"
      - key: SESSION_MAX_AGE
        value: "604800"
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "1"
