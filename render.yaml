# Blueprint Render : https://render.com/docs/blueprint-spec
#
# Base de données : créez une PostgreSQL sur Render (Dashboard → New → PostgreSQL),
# puis liez-la à ce Web Service. Render injecte DATABASE_URL automatiquement.
# Sans PostgreSQL, l’app utilise SQLite sur un disque éphémère : comptes et messages
# disparaissent au redémarrage / mise en veille.
#
# Déploiement : New → Blueprint → connecter le dépôt Git contenant ce fichier.
services:
  - type: web
    name: communication-interne
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      # Obligatoire : SQLAlchemy 2.0.36 plante sur Python 3.14 (typing.Union).
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "1"
      - key: SESSION_MAX_AGE
        value: "604800"
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "1"
