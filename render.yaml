# Blueprint Render : https://render.com/docs/blueprint-spec
# Déploiement : New → Blueprint → connecter le dépôt Git contenant ce fichier.
services:
  - type: web
    name: communication-interne
    runtime: python
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "1"
      - key: SESSION_MAX_AGE
        value: "604800"
      - key: ALLOW_PUBLIC_REGISTRATION
        value: "1"
